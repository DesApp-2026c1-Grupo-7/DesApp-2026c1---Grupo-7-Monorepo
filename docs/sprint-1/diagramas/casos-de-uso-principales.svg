<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Actors -->
  <g transform="translate(50, 250)">
    <circle cx="0" cy="-20" r="15" fill="none" stroke="#334155" stroke-width="2"/>
    <path d="M0,0 L0,30 M-15,10 L15,10 M0,30 L-15,50 M0,30 L15,50" fill="none" stroke="#334155" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Estudiante</text>
  </g>

  <g transform="translate(750, 250)">
    <circle cx="0" cy="-20" r="15" fill="none" stroke="#334155" stroke-width="2"/>
    <path d="M0,0 L0,30 M-15,10 L15,10 M0,30 L-15,50 M0,30 L15,50" fill="none" stroke="#334155" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Administrador</text>
  </g>

  <!-- System Boundary -->
  <rect x="150" y="50" width="500" height="500" fill="white" stroke="#94a3b8" stroke-width="2" rx="10"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#64748b">Sistema Académico - Casos de Uso Principales</text>

  <!-- Use Cases -->
  <!-- Auth -->
  <g transform="translate(400, 100)">
    <ellipse cx="0" cy="0" rx="100" ry="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12">Registro / Login</text>
  </g>
  
  <!-- Situacion Academica -->
  <g transform="translate(300, 200)">
    <ellipse cx="0" cy="0" rx="110" ry="35" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12">Cargar/Ver Situación Académica</text>
  </g>

  <!-- Carrera -->
  <g transform="translate(500, 300)">
    <ellipse cx="0" cy="0" rx="100" ry="30" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12">Configurar Carrera</text>
  </g>

  <!-- Plan de Estudio -->
  <g transform="translate(500, 400)">
    <ellipse cx="0" cy="0" rx="110" ry="35" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12">Cargar Plan de Estudio</text>
  </g>

  <!-- Proyecciones -->
  <g transform="translate(300, 450)">
    <ellipse cx="0" cy="0" rx="100" ry="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12">Generar Proyecciones</text>
  </g>

  <!-- Connections - Student -->
  <line x1="65" y1="250" x2="300" y2="115" stroke="#94a3b8" stroke-dasharray="4"/>
  <line x1="65" y1="260" x2="190" y2="200" stroke="#94a3b8" stroke-dasharray="4"/>
  <line x1="65" y1="270" x2="200" y2="440" stroke="#94a3b8" stroke-dasharray="4"/>

  <!-- Connections - Admin -->
  <line x1="735" y1="250" x2="500" y2="115" stroke="#94a3b8" stroke-dasharray="4"/>
  <line x1="735" y1="260" x2="600" y2="300" stroke="#94a3b8" stroke-dasharray="4"/>
  <line x1="735" y1="270" x2="610" y2="400" stroke="#94a3b8" stroke-dasharray="4"/>

</svg>
